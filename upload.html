<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传文件 - CarpAgent</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 保留您原有的粒子背景、动画效果 */
        body { background: #f5f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 750px; padding: 36px; box-shadow: 0 10px 35px rgba(0,0,0,0.1); border-radius: 16px; background: #fff; position: relative; overflow: hidden; }
        #particles-js { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }
        .btn-primary { background: linear-gradient(45deg, #4CAF50, #8BC34A); border: none; padding: 12px 24px; border-radius: 8px; color: white; font-weight: 600; }
        .file-upload { border: 2px dashed #e2e8f0; padding: 20px; text-align: center; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="particles-js"></div>
        <a href="/" class="absolute top-4 left-4 text-green-600"><i class="fas fa-arrow-left"></i> 返回</a>

        <h1 class="text-2xl font-bold text-center text-green-700 mb-6">上传材料数据文件</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 p-3 rounded bg-{{ 'green' if category=='success' else 'red' }}-100 text-{{ 'green' if category=='success' else 'red' }}-700">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" enctype="multipart/form-data" class="space-y-4">
            <div class="file-upload">
                <i class="fas fa-cloud-upload-alt text-4xl text-green-500 mb-2"></i>
                <p class="mb-2">选择CSV/Excel文件（需包含material_id列）</p>
                <input type="file" name="file" accept=".csv,.xlsx" required class="hidden" id="fileInput">
                <label for="fileInput" class="btn-primary cursor-pointer">浏览文件</label>
                <p id="fileName" class="mt-2 text-sm text-gray-500"></p>
            </div>

            <button type="submit" class="btn-primary w-full">上传并处理</button>
        </form>
    </div>

    <script>
        // 显示选中的文件名
        document.getElementById('fileInput').addEventListener('change', function(e) {
            document.getElementById('fileName').textContent = e.target.files[0]?.name || '';
        });

        // 粒子背景（复用您原有的particlesJS配置）
        particlesJS('particles-js', { /* 与index.html相同配置 */ });
    </script>
</body>
</html>
